name: Daily Finance Job Scraper

on:
  schedule:
    - cron: '0 13 * * *'  # 9 AM ET (UTC-4 summer) / 8 AM EST (UTC-5 winter)
  workflow_dispatch:       # allow manual trigger for testing

permissions:
  contents: write          # needed to commit seen_jobs.json back

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          SMTP_ADDRESS: ${{ secrets.SMTP_ADDRESS }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          git diff --cached --quiet || git commit -m "chore: update seen_jobs.json [skip ci]"
          git push
